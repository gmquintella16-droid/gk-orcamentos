<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GK Fotografia e Filmes - Proposta</title>
    <style>
        :root { --primary: #111; --accent: #b8860b; --success: #1b5e20; --whatsapp: #25d366; --bg: #eceff1; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: var(--bg); padding: 15px; color: #222; }
        .container { max-width: 600px; background: #fff; padding: 25px; border-radius: 10px; box-shadow: 0 5px 20px rgba(0,0,0,0.15); margin: auto; }
        .header { text-align: center; border-bottom: 1px solid #ddd; padding-bottom: 15px; margin-bottom: 20px; }
        .header h1 { margin: 0; font-size: 22px; color: var(--primary); letter-spacing: 1px; }
        .header p { margin: 2px 0 0; font-size: 11px; color: #777; text-transform: uppercase; letter-spacing: 2px; }
        .section-title { font-size: 12px; font-weight: bold; color: var(--accent); text-transform: uppercase; margin: 20px 0 10px; border-left: 3px solid var(--accent); padding-left: 8px; }
        .card-config { background: #f9f9f9; border: 1px solid #eee; padding: 15px; border-radius: 8px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .grid-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .full { grid-column: span 2; }
        label { display: block; font-size: 11px; font-weight: 700; color: #555; margin-bottom: 4px; }
        input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; font-size: 15px; }
        .btn { width: 100%; padding: 14px; color: #fff; border: none; border-radius: 6px; cursor: pointer; font-size: 15px; font-weight: bold; margin-top: 15px; display: block; text-align: center; text-decoration: none; transition: 0.2s; }
        .btn-calc { background-color: var(--primary); }
        .btn-wa { background-color: var(--whatsapp); display: none; margin-top: 20px; }
        .resumo-box { margin-top: 25px; border: 1px solid #ddd; border-radius: 8px; display: none; background: #fff; }
        .resumo-header { background: #f4f4f4; padding: 12px; font-weight: bold; text-align: center; border-bottom: 1px solid #ddd; }
        .resumo-body { padding: 15px; }
        .item-row { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px dashed #eee; font-size: 13px; }
        .financeiro { margin-top: 15px; background: #f0f4f0; padding: 12px; border-radius: 6px; border-left: 4px solid var(--success); }
        .total-destaque { font-size: 26px; font-weight: 800; text-align: center; margin-bottom: 12px; color: var(--primary); }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>GK FOTOGRAFIA E FILMES</h1>
        <p>Eternizando Momentos</p>
    </div>

    <div class="section-title">Valores Base de Cálculo</div>
    <div class="card-config">
        <div><label>Hora Trabalho (R$):</label><input type="number" id="baseHora" value="100"></div>
        <div><label>Cada Foto (R$):</label><input type="number" id="baseFoto" value="8"></div>
        <div><label>Cada Vídeo (R$):</label><input type="number" id="baseVideo" value="50"></div>
        <div><label>Valor KM (R$):</label><input type="number" id="baseKm" value="1.50"></div>
    </div>

    <div class="section-title">Dados da Proposta</div>
    <div class="grid-inputs">
        <div class="full"><label>Nome do Cliente/Evento:</label><input type="text" id="cliente" placeholder="Ex: Batizado do Benício"></div>
        <div><label>Horas de Cobertura:</label><input type="number" id="horas" value="3"></div>
        <div><label>Qtd de Fotos:</label><input type="number" id="fotos" value="50"></div>
        <div><label>Qtd de Vídeos:</label><input type="number" id="videos" value="1"></div>
        <div><label>Distância (KM):</label><input type="number" id="km" value="0"></div>
        <div class="full"><label>Custos Extras (R$):</label><input type="number" id="custos" value="0"></div>
    </div>

    <button class="btn btn-calc" onclick="calcular()">Gerar Proposta Profissional</button>

    <div class="resumo-box" id="resultado">
        <div class="resumo-header">CONTROLE INTERNO - GK</div>
        <div class="resumo-body">
            <div class="total-destaque" id="outTotal">R$ 0,00</div>
            <div id="detalhes"></div>
            <div class="financeiro">
                <div class="item-row"><span>Dízimo (10%):</span><span id="outDizimo" style="color:#c0392b;"></span></div>
                <div class="item-row"><span>Caixa Empresa (40%):</span><span id="outCaixa"></span></div>
                <div class="item-row" style="border:none; margin-top:5px;">
                    <strong style="color: var(--success);">SALÁRIO LÍQUIDO:</strong>
                    <strong id="outSalario" style="color: var(--success);"></strong>
                </div>
            </div>
            <button class="btn btn-wa" id="btnWa" onclick="enviarWhatsApp()">Enviar Proposta via WhatsApp</button>
        </div>
    </div>
</div>

<script>
    let dados = {};

    function calcular() {
        const ph = parseFloat(document.getElementById('baseHora').value) || 0;
        const pf = parseFloat(document.getElementById('baseFoto').value) || 0;
        const pv = parseFloat(document.getElementById('baseVideo').value) || 0;
        const pk = parseFloat(document.getElementById('baseKm').value) || 0;

        const cli = document.getElementById('cliente').value || "Cliente";
        const h = parseFloat(document.getElementById('horas').value) || 0;
        const f = parseFloat(document.getElementById('fotos').value) || 0;
        const v = parseFloat(document.getElementById('videos').value) || 0;
        const k = parseFloat(document.getElementById('km').value) || 0;
        const c = parseFloat(document.getElementById('custos').value) || 0;

        const total = (h * ph) + (f * pf) + (v * pv) + (k * pk) + c;
        dados = { cli, h, f, v, k, total };

        document.getElementById('resultado').style.display = 'block';
        document.getElementById('btnWa').style.display = 'block';
        document.getElementById('outTotal').innerText = total.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
        
        let lista = "";
        if(h > 0) lista += `<div class="item-row"><span>Cobertura (${h}h)</span><span>R$ ${(h*ph).toFixed(2)}</span></div>`;
        if(f > 0) lista += `<div class="item-row"><span>Fotos (${f}un)</span><span>R$ ${(f*pf).toFixed(2)}</span></div>`;
        if(v > 0) lista += `<div class="item-row"><span>Vídeos (${v}un)</span><span>R$ ${(v*pv).toFixed(2)}</span></div>`;
        if(k > 0) lista += `<div class="item-row"><span>Deslocamento (${k}km)</span><span>R$ ${(k*pk).toFixed(2)}</span></div>`;
        if(c > 0) lista += `<div class="item-row"><span>Extras</span><span>R$ ${c.toFixed(2)}</span></div>`;
        
        document.getElementById('detalhes').innerHTML = lista;
        document.getElementById('outDizimo').innerText = (total * 0.1).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
        document.getElementById('outCaixa').innerText = (total * 0.4).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
        document.getElementById('outSalario').innerText = (total * 0.5).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
    }

    function enviarWhatsApp() {
        const totalFmt = dados.total.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
        const kmTexto = dados.k > 0 ? `* Valor de deslocamento incluso (${dados.k}km).` : `* Valor de deslocamento a calcular conforme a quilometragem.`;
        
        let msg = `Olá! ✨ Conversamos sobre a sua necessidade para o *${dados.cli}* e, para que você não fique sem esse registro tão especial, preparamos uma proposta exclusiva com um investimento mais acessível, focando nos momentos principais.\n\n`;
        msg += `📸 *Pacote Essencial: Fotografia + Vídeo*\n`;
        msg += `* Cobertura: ${dados.h}h de evento.\n`;
        msg += `* Fotos: ${dados.f} fotos selecionadas e tratadas em alta resolução.\n`;
        msg += `* Vídeo: ${dados.v} Clipe curto (estilo Reels/Stories) com os melhores momentos.\n`;
        msg += `* Entrega: Galeria digital para download.\n\n`;
        msg += `*Investimento:*\n`;
        msg += `* ${totalFmt} (via Pix).\n`;
        msg += `* Ou parcelado em até 12x no cartão (taxas por conta do cliente).\n`;
        msg += `${kmTexto}\n\n`;
        msg += `Dessa forma, garantimos as fotos mais importantes e um vídeo emocionante para você compartilhar com a família. O que acha dessa opção para fecharmos a data? ✨\n\n`;
        msg += `*GK Fotografia e Filmes*`;

        window.open("https://wa.me/?text=" + encodeURIComponent(msg), '_blank');
    }
</script>
</body>
</html>
