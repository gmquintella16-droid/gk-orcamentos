<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GK Fotografia e Filmes - Gestão V13</title>
    <style>
        :root { --primary: #111; --accent: #b8860b; --success: #1b5e20; --whatsapp: #25d366; --bg: #f4f7f6; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { overflow-x: hidden; width: 100%; }
        body { font-family: 'Segoe UI', Roboto, Arial, sans-serif; background-color: var(--bg); padding: 10px; color: #222; margin: 0; }
        .container { max-width: 450px; background: #fff; padding: 15px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin: auto; }
        .header { text-align: center; border-bottom: 1px solid #eee; padding-bottom: 8px; margin-bottom: 10px; }
        .header h1 { margin: 0; font-size: 18px; color: var(--primary); letter-spacing: 1px; }
        .section-title { font-size: 10px; font-weight: bold; color: var(--accent); text-transform: uppercase; margin: 12px 0 6px; border-left: 3px solid var(--accent); padding-left: 6px; }
        .card-config { background: #fafafa; border: 1px solid #eee; padding: 10px; border-radius: 8px; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .grid-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .full { grid-column: span 2; }
        label { display: block; font-size: 10px; font-weight: 700; color: #666; margin-bottom: 2px; }
        input { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 6px; font-size: 16px; background: #fff; }
        .btn { width: 100%; padding: 12px; color: #fff; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: bold; margin-top: 10px; }
        .btn-calc { background-color: var(--primary); }
        .btn-wa { background-color: var(--whatsapp); display: none; margin-top: 15px; }
        .btn-edit { background: #eee; border: none; color: #555; font-size: 10px; padding: 5px 10px; border-radius: 4px; margin-top: 5px; font-weight: bold; }
        .tabela-v { background: #fffdf0; padding: 10px; border-radius: 6px; font-size: 12px; border: 1px solid #ffe082; line-height: 1.6; }
        .edit-tabela { display: none; grid-template-columns: 1fr 1fr; gap: 6px; margin-top: 8px; }
        .edit-tabela input { padding: 6px; font-size: 14px; text-align: center; }
        .resumo-box { margin-top: 15px; border: 1px solid #ddd; border-radius: 8px; display: none; background: #fff; animation: fadeIn 0.4s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .resumo-header { background: #f8f8f8; padding: 8px; font-weight: bold; text-align: center; border-bottom: 1px solid #ddd; font-size: 13px; }
        .resumo-body { padding: 10px; }
        .item-row { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px dashed #eee; font-size: 11px; }
        .total-destaque { font-size: 22px; font-weight: 800; text-align: center; margin-bottom: 8px; color: var(--primary); }
        .financeiro { margin-top: 10px; background: #f1f8f1; padding: 10px; border-radius: 8px; border-left: 4px solid var(--success); }
    </style>
</head>
<body>

<div class="container">
    <div class="header"><h1>GK FOTOGRAFIA E FILMES</h1></div>

    <div class="section-title">Valores Base</div>
    <div class="card-config">
        <div><label>Valor Hora:</label><input type="number" id="baseHora" value="100"></div>
        <div><label>Valor Vídeo:</label><input type="number" id="baseVideo" value="50"></div>
        <div class="full"><label>Valor KM (R$):</label><input type="number" id="baseKm" value="1.50"></div>
        
        <div class="full">
            <div class="tabela-v" id="viewTabela">
                📍 0-10 fotos: R$ <span id="v1">12</span>/un<br>
                📍 11-20 fotos: R$ <span id="v2">8</span>/un<br>
                📍 21-40 fotos: R$ <span id="v3">6</span>/un<br>
                📍 + de 40 fotos: R$ <span id="v4">4</span>/un
            </div>
            <button class="btn-edit" onclick="toggleEdit()">✏️ Editar Tabela</button>
            <div class="edit-tabela" id="editCampos">
                <div><label>0-10:</label><input type="number" id="f1" value="12"></div>
                <div><label>11-20:</label><input type="number" id="f2" value="8"></div>
                <div><label>21-40:</label><input type="number" id="f3" value="6"></div>
                <div><label>+40:</label><input type="number" id="f4" value="4"></div>
            </div>
        </div>
    </div>

    <div class="section-title">Dados da Proposta</div>
    <div class="grid-inputs">
        <div class="full"><label>Nome do Cliente:</label><input type="text" id="cliente" placeholder="Ex: Batizado"></div>
        <div><label>Horas:</label><input type="number" id="horas" value="1"></div>
        <div><label>Qtd Fotos:</label><input type="number" id="fotos" value="10"></div>
        <div><label>Qtd Vídeos:</label><input type="number" id="videos" value="0"></div>
        <div><label>KM Distância:</label><input type="number" id="km" value="0"></div>
        <div class="full"><label>Custos Extras (R$):</label><input type="number" id="custos" value="0"></div>
    </div>

    <button class="btn btn-calc" onclick="calcular()">Calcular Proposta</button>

    <div class="resumo-box" id="resultado">
        <div class="resumo-header">RESUMO DO ORÇAMENTO</div>
        <div class="resumo-body">
            <div class="total-destaque" id="outTotal">R$ 0,00</div>
            <div id="detalhes"></div>
            
            <div class="financeiro">
                <div class="item-row"><span>Dízimo (10%):</span><span id="outDizimo" style="color:#d32f2f"></span></div>
                <div class="item-row"><span>Caixa Empresa (40%):</span><span id="outCaixa"></span></div>
                <div class="item-row" style="border:none; margin-top:5px; font-size:13px;"><strong>SALÁRIO:</strong><strong id="outSalario" style="color:var(--success)"></strong></div>
            </div>

            <button class="btn btn-wa" id="btnWa" onclick="enviarWhatsApp()">Enviar via WhatsApp</button>
        </div>
    </div>
</div>

<script>
    let dados = {};

    function toggleEdit() {
        const e = document.getElementById('editCampos');
        e.style.display = e.style.display === 'grid' ? 'none' : 'grid';
    }

    function calcular() {
        const p1 = parseFloat(document.getElementById('f1').value);
        const p2 = parseFloat(document.getElementById('f2').value);
        const p3 = parseFloat(document.getElementById('f3').value);
        const p4 = parseFloat(document.getElementById('f4').value);
        
        document.getElementById('v1').innerText = p1; document.getElementById('v2').innerText = p2;
        document.getElementById('v3').innerText = p3; document.getElementById('v4').innerText = p4;

        const ph = parseFloat(document.getElementById('baseHora').value) || 0;
        const pv = parseFloat(document.getElementById('baseVideo').value) || 0;
        const pkm = parseFloat(document.getElementById('baseKm').value) || 0;

        const cli = document.getElementById('cliente').value || "Cliente";
        const h = parseFloat(document.getElementById('horas').value) || 0;
        const f = parseFloat(document.getElementById('fotos').value) || 0;
        const v = parseFloat(document.getElementById('videos').value) || 0;
        const k = parseFloat(document.getElementById('km').value) || 0;
        const c = parseFloat(document.getElementById('custos').value) || 0;

        let precoUn = 0;
        if (f <= 10) precoUn = p1;
        else if (f <= 20) precoUn = p2;
        else if (f <= 40) precoUn = p3;
        else precoUn = p4;

        const totalFotos = f * precoUn;
        const totalLogistica = (k * pkm) + c; // KM + EXTRAS SOMADOS
        const totalGeral = (h * ph) + totalFotos + (v * pv) + totalLogistica;
        
        dados = { cli, h, f, v, totalGeral, totalLogistica, precoUn, totalFotos };

        const resBox = document.getElementById('resultado');
        resBox.style.display = 'block';
        document.getElementById('btnWa').style.display = 'block';
        document.getElementById('outTotal').innerText = totalGeral.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
        
        let lista = `<div class="item-row"><span>Mão de obra (${h}h)</span><span>R$ ${(h*ph).toFixed(2)}</span></div>`;
        lista += `<div class="item-row"><span>Fotos (${f}un x R$ ${precoUn})</span><span>R$ ${totalFotos.toFixed(2)}</span></div>`;
        if(v > 0) lista += `<div class="item-row"><span>Vídeo (${v}un)</span><span>R$ ${(v*pv).toFixed(2)}</span></div>`;
        
        // MOSTRA FRETE + CUSTOS JUNTOS NO RESUMO
        if(totalLogistica > 0) {
            lista += `<div class="item-row" style="background:#fff9c4; font-weight:bold;"><span>🚚 Frete + Custos:</span><span>R$ ${totalLogistica.toFixed(2)}</span></div>`;
        }
        
        document.getElementById('detalhes').innerHTML = lista;
        document.getElementById('outDizimo').innerText = (totalGeral * 0.1).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
        document.getElementById('outCaixa').innerText = (totalGeral * 0.4).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
        document.getElementById('outSalario').innerText = (totalGeral * 0.5).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });

        resBox.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    function enviarWhatsApp() {
        const totalFmt = dados.totalGeral.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
        const logFmt = dados.totalLogistica.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
        
        let msg = `Olá! ✨ Preparamos a proposta para: *${dados.cli}*.\n\n`;
        msg += `📸 *O que está incluso:*\n`;
        msg += `* Cobertura técnica de ${dados.h}h.\n`;
        msg += `* Entrega de ${dados.f} fotos tratadas.\n`;
        if(dados.v > 0) msg += `* ${dados.v} Clipe de Vídeo (Reels/Stories).\n`;
        msg += `* Galeria digital para download.\n\n`;
        msg += `💰 *Investimento:*\n`;
        msg += `* Trabalho Fotográfico: ${(dados.totalGeral - dados.totalLogistica).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' })}\n`;
        if(dados.totalLogistica > 0) msg += `* 🚚 Deslocamento: ${logFmt}\n`;
        msg += `* *TOTAL FINAL: ${totalFmt}*\n\n`;
        msg += `*Pagamento:* Pix ou cartão (taxas por conta do cliente).\n\n`;
        msg += `Vamos fechar essa data? ✨\n\n`;
        msg += `*GK Fotografia e Filmes*`;
        window.open("https://wa.me/?text=" + encodeURIComponent(msg), '_blank');
    }
</script>
</body>
</html>
